version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=sandbox_user
      - POSTGRES_PASSWORD=sandbox_password
      - POSTGRES_DB=system_design_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@sandbox.com
      - PGADMIN_DEFAULT_PASSWORD=admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres_db

volumes:
  pgdata: