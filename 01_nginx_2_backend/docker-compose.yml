version: '3.8'

services:

  # NGINX Load Balancer
  nginx_lb:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web_app_1
      - web_app_2

  # Backend Instance 1
  web_app_1:
    build: .    
    environment:
      - REDIS_HOST=redis_cache      
    depends_on:
      - redis_cache      

  # Backend Instance 2
  web_app_2:
    build: .    
    environment:
      - REDIS_HOST=redis_cache      
    depends_on:
      - redis_cache      

  # Redis Instance
  redis_cache:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"